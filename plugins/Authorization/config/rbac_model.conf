[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

# Wildcard-aware matcher (old __DEV__ model): a policy may grant "*" as the
# object and/or action, so "p, super, *, *" is full access and
# "p, admin, users, *" is module-wide access.
[matchers]
m = g(r.sub, p.sub) && (p.obj == "*" || r.obj == p.obj) && (p.act == "*" || r.act == p.act)
