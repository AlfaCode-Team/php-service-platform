# Configures GitHub's auto-generated release notes (generate_release_notes: true).
# PRs are grouped into sections by label; matching authors/labels are excluded.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
    authors:
      - dependabot
      - github-actions
  categories:
    - title: 🚀 Features
      labels: [feature, enhancement]
    - title: 🐛 Bug Fixes
      labels: [bug, fix]
    - title: 🔐 Security
      labels: [security]
    - title: 📦 Native / Packaging
      labels: [packaging, release, ci]
    - title: 🧪 Tests
      labels: [tests]
    - title: 📚 Documentation
      labels: [documentation, docs]
    - title: 🔧 Maintenance
      labels: [chore, refactor, dependencies]
    - title: 🔄 Other Changes
      labels: ["*"]
