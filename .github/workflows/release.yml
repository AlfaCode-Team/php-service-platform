name: Release

# Two ways in:
#   1. push a `v*` tag        → VERSION comes from the tag name.
#   2. workflow_call (version) → VERSION comes from the caller (auto-release.yml),
#                                so no PAT is needed to chain from a merge to main.
"on":
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      version:
        description: "Release version without the leading v (e.g. 1.0.12)"
        required: true
        type: string

permissions:
  contents: write

# Single source of truth for bundling is tools/bundle.sh. Each job sets up the
# toolchain, then calls the script for its OS target. VERSION comes from the tag
# (push) or the workflow_call input.
env:
  ZIG_VERSION: "0.17.0-dev.657+2faf8debf"
  # Resolved version for every job: the input when called, else the tag name.
  RELEASE_VERSION: ${{ inputs.version || '' }}

jobs:
  # ── Gate: run the PHPUnit suite. Nothing builds or publishes unless GREEN. ──
  test:
    name: Test (PHPUnit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }   # path-repo modules must be present
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          extensions: mbstring, curl, pdo, pdo_sqlite, openssl, fileinfo, zip
      - name: Install dependencies (with dev)
        run: composer install --no-interaction --no-progress
      - name: Run test suite
        run: vendor/bin/phpunit --no-coverage

  # Every bundle is built on Linux — Zig cross-compiles all targets, and the
  # macOS universal binary is assembled with llvm-lipo. This needs only ONE
  # self-hosted Zig toolchain (Linux) and no macOS runner.

  # ── Linux: .deb (amd64) ────────────────────────────────────────────────────
  build-linux:
    name: Build Linux .deb
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - name: Setup Zig
        run: ./tools/ci/setup-zig.sh
        env: { ZIG_DIST_URL: "${{ vars.ZIG_DIST_URL }}" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (linux)
        run: VERSION="${RELEASE_VERSION:-${GITHUB_REF_NAME#v}}" ./tools/bundle.sh linux
      - uses: actions/upload-artifact@v5
        with: { name: linux-deb, path: dist/*.deb }

  # ── Windows: .zip (x86_64, cross-compiled) ────────────────────────────────
  build-windows:
    name: Build Windows .zip
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - name: Setup Zig
        run: ./tools/ci/setup-zig.sh
        env: { ZIG_DIST_URL: "${{ vars.ZIG_DIST_URL }}" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (windows)
        run: VERSION="${RELEASE_VERSION:-${GITHUB_REF_NAME#v}}" ./tools/bundle.sh windows
      - uses: actions/upload-artifact@v5
        with: { name: windows-zip, path: dist/*.zip }

  # ── macOS: universal .app tarball (arm64 + x86_64), built ON LINUX ─────────
  build-macos:
    name: Build macOS .app
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - name: Install llvm-lipo (for the universal Mach-O)
        run: sudo apt-get update && sudo apt-get install -y llvm
      - name: Setup Zig
        run: ./tools/ci/setup-zig.sh
        env: { ZIG_DIST_URL: "${{ vars.ZIG_DIST_URL }}" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (macos)
        run: VERSION="${RELEASE_VERSION:-${GITHUB_REF_NAME#v}}" ./tools/bundle.sh macos
      - uses: actions/upload-artifact@v5
        with: { name: macos-app, path: dist/*.tar.gz }

  # ── Publish GitHub Release with all artifacts ─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5      # need CHANGELOG.md at the checked-out commit
      - uses: actions/download-artifact@v5
        with: { path: artifacts/ }
      - name: Resolve version + extract CHANGELOG section
        id: notes
        run: |
          VERSION="${RELEASE_VERSION:-${GITHUB_REF_NAME#v}}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Pull the block between "## [VERSION]" and the next "## [" heading.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > release-body.md
          if [ -s release-body.md ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No CHANGELOG entry for $VERSION — using auto-generated notes only."
          fi
      - uses: softprops/action-gh-release@v2
        with:
          # When called from auto-release the ref is a branch, so name the tag
          # explicitly; on a tag push this matches GITHUB_REF_NAME anyway.
          tag_name: v${{ steps.notes.outputs.version }}
          files: |
            artifacts/linux-deb/*.deb
            artifacts/windows-zip/*.zip
            artifacts/macos-app/*.tar.gz
          # Curated section (if present) goes first; GitHub appends the
          # auto-generated "What's Changed" / contributors below it.
          body_path: ${{ steps.notes.outputs.has_notes == 'true' && 'release-body.md' || '' }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.notes.outputs.version, '-') }}
