name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Single source of truth for bundling is tools/bundle.sh. Each job sets up the
# toolchain, then calls the script for its OS target. VERSION comes from the tag.
env:
  ZIG_VERSION: "0.17.0-dev.657+2faf8debf"

jobs:
  # ── Gate: run the PHPUnit suite. Nothing builds or publishes unless GREEN. ──
  test:
    name: Test (PHPUnit)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }   # path-repo modules must be present
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer
          extensions: mbstring, curl, pdo, pdo_sqlite, openssl, fileinfo, zip
      - name: Install dependencies (with dev)
        run: composer install --no-interaction --no-progress
      - name: Run test suite
        run: vendor/bin/phpunit --no-coverage

  # ── Linux: .deb (amd64) ────────────────────────────────────────────────────
  build-linux:
    name: Build Linux .deb
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mlugg/setup-zig@v1
        with: { version: "0.17.0-dev.657+2faf8debf" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (linux)
        run: VERSION="${GITHUB_REF_NAME#v}" ./tools/bundle.sh linux
      - uses: actions/upload-artifact@v4
        with: { name: linux-deb, path: dist/*.deb }

  # ── Windows: .zip (x86_64, cross-compiled) ────────────────────────────────
  build-windows:
    name: Build Windows .zip
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mlugg/setup-zig@v1
        with: { version: "0.17.0-dev.657+2faf8debf" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (windows)
        run: VERSION="${GITHUB_REF_NAME#v}" ./tools/bundle.sh windows
      - uses: actions/upload-artifact@v4
        with: { name: windows-zip, path: dist/*.zip }

  # ── macOS: universal .app tarball (arm64 + x86_64) ────────────────────────
  build-macos:
    name: Build macOS .app
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: mlugg/setup-zig@v1
        with: { version: "0.17.0-dev.657+2faf8debf" }
      - uses: shivammathur/setup-php@v2
        with: { php-version: "8.4", tools: composer }
      - name: Bundle (macos)
        run: VERSION="${GITHUB_REF_NAME#v}" ./tools/bundle.sh macos
      - uses: actions/upload-artifact@v4
        with: { name: macos-app, path: dist/*.tar.gz }

  # ── Publish GitHub Release with all artifacts ─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts/ }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-deb/*.deb
            artifacts/windows-zip/*.zip
            artifacts/macos-app/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
