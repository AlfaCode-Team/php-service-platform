name: CI

# Runs on every push to main and on every PR targeting main, so the suite and
# the native toolchain are validated on each change — not only at release time.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PHP test suite across supported versions ───────────────────────────────
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]   # real floor: Symfony 8 + PHPUnit require PHP >= 8.4.1
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }   # path-repo modules must be present
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mbstring, curl, pdo, pdo_sqlite, openssl, fileinfo, zip, intl
          coverage: none
      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-all
      - name: Install dependencies
        run: composer install --no-interaction --no-progress
      - name: Run test suite
        run: vendor/bin/phpunit --no-coverage

  # ── Native launcher: compile for every release target ──────────────────────
  # One Linux host cross-compiles the launcher for EVERY target (Zig cross-compiles
  # natively), using the self-hosted pinned toolchain — no dependency on upstream
  # keeping the ephemeral dev build around.
  zig:
    name: Zig build (all targets)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig (self-hosted pinned toolchain)
        run: ./tools/ci/setup-zig.sh
        env:
          ZIG_DIST_URL: ${{ vars.ZIG_DIST_URL }}
      - name: Build launcher for all targets
        working-directory: tools
        run: |
          for t in x86_64-linux-gnu x86_64-windows-gnu aarch64-macos x86_64-macos; do
            echo "::group::$t"; zig build --release=small -Dtarget="$t"; echo "::endgroup::"
          done
