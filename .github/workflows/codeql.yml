name: CodeQL

# CodeQL analyses the languages GitHub supports for this repo. NOTE: CodeQL does
# NOT support PHP, so the framework's PHP code is covered by the separate
# php-analysis.yml workflow (Semgrep + composer audit). Here we scan the
# JavaScript/TypeScript frontends and the GitHub Actions workflows.

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 3 * * 1"   # weekly, Monday 03:27 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04
    permissions:
      security-events: write   # upload results to code scanning
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "actions"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          language: ${{ matrix.language }}
          # Default + security-extended query suites for stronger coverage.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
