name: ✨ Feature request
description: Suggest a new capability or improvement for the framework.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem you're
        trying to solve, not just the solution — it helps us find the best design.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This request fits the Gated Demand Architecture (it does not import Laravel/Symfony/Slim patterns).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve? What are you unable to do today?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API/behavior you'd like. Include sketch code if helpful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered and why you rejected them.
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Which layer would this affect?
      options:
        - Kernel
        - A new or existing plugin
        - Native launcher / tooling
        - Migrations / database
        - CLI
        - Docs only
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request to implement this.
          required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, references, or prior art.
    validations:
      required: false
